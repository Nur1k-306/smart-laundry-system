server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: ${BOOKING_SERVICE_DB_URL:jdbc:postgresql://localhost:55432/bookings_db}
    username: ${BOOKING_SERVICE_DB_USERNAME:postgres}
    password: ${BOOKING_SERVICE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    connect-retries: 10
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: booking-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  threads:
    virtual:
      enabled: true

app:
  device-service-url: ${DEVICE_SERVICE_URL:http://localhost:8082}
  booking:
    expiration-seconds: ${BOOKING_EXPIRATION_SECONDS:90}
    expiration-check-ms: ${BOOKING_EXPIRATION_CHECK_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  config: classpath:logback-spring.xml
